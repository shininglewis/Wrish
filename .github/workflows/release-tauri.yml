name: Release Tauri

on:
  push:
    tags:
      - 'tauri-v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Tauri
        run: |
          cd wrish-tauri
          cargo build --release

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: wrish-tauri/target/release/wrish-tauri.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}