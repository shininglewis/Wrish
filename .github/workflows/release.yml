name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish Wrish/Wrish.csproj -c Release -o ./out --self-contained false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Wrish
          path: ./out/**

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./out/**
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}